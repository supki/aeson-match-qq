name: aeson-match-qq
version: 2.0.0
synopsis: Declarative JSON matchers.
description: See README.markdown
category: Web
maintainer: matvey.aksenov@gmail.com
copyright: Matvey Aksenov 2022
license: BSD2
extra-source-files:
  - README.markdown
  - CHANGELOG.markdown
github: supki/aeson-match-qq
tested-with:
  - GHC==9.8.4

default-extensions:
  - ImportQualifiedPost

dependencies:
  - base >= 4.14 && < 5

library:
  dependencies:
    - aeson
    - attoparsec
    - attoparsec-aeson
    - bytestring
    - case-insensitive
    - containers
    - either
    - ghc-hs-meta
    - pretty
    - scientific
    - template-haskell
    - text
    - unordered-containers
    - vector
  source-dirs:
    src
  ghc-options:
    - -funbox-strict-fields
    - -Wall
    - -Wno-incomplete-uni-patterns
    # - -Werror

tests:
  spec:
    build-tools:
      - hspec-discover
    dependencies:
      - aeson
      - aeson-qq
      - aeson-match-qq
      - hspec
      - text
      - unordered-containers
    source-dirs:
      test
    main:
      Spec.hs
    ghc-options:
      - -Wall
      - -Wno-incomplete-uni-patterns
      # - -Werror
      - -threaded
      - -with-rtsopts=-N
